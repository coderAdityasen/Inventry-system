version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: inventory-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=inventory_db
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - inventory-network
    restart: unless-stopped

  # Frontend service
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: builder
    container_name: inventory-frontend-dev
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_ENVIRONMENT=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - inventory-network
    depends_on:
      - backend
    restart: unless-stopped

  # MySQL database service
  mysql:
    image: mysql:8.0
    container_name: inventory-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=inventory_db
      - MYSQL_USER=inventory_user
      - MYSQL_PASSWORD=inventory_pass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - inventory-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  inventory-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
