version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: development
    container_name: inventory-backend
    ports:
      - "5000:8000"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=inventory_user
      - DB_PASSWORD=inventory_pass
      - DB_NAME=inventory_db
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - inventory-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Frontend service
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: development
    container_name: inventory-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_ENVIRONMENT=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - inventory-network
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    stdin_open: true
    tty: true

  # MySQL database service
  mysql:
    image: mysql:8.0
    container_name: inventory-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=inventory_db
      - MYSQL_USER=inventory_user
      - MYSQL_PASSWORD=inventory_pass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - inventory-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  inventory-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
